# Local Supabase config for the dragun app.
#
# Each project under Documents/dev/madelucid claims a 10-port block so the
# stacks can run in parallel without colliding:
#   madelucid    54320-54329
#   havre        54330-54339
#   dragun       54340-54349  (this file)
#   junglething  54350-54359
#
# Run `npm run db:start` to bring it up. Production never reads this file.

project_id = "dragun"

[api]
enabled = true
port = 54341
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54342
shadow_port = 54340
major_version = 15

[db.pooler]
enabled = false
port = 54349
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54343
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54344
smtp_port = 54345
pop3_port = 54346

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = false

[analytics]
enabled = false
port = 54347
